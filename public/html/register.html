<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itoshira</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="login-container"> <div class="login-left">
        <div class="overlay">
            <h1>Itoshira</h1>
            <p>Xin Chào Quý Khách!</p>
            </div>
    </div>

    <div class="login-right">
        <div class="login-box">
            <h2>Đăng ký tài khoản</h2> <form id="register-form">   
                <div class="input-group">
                    <input id="fullname" type="text" placeholder="Họ và tên" required>
                </div>

                <div class="input-group">
                    <input id="email" type="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input id="username" type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input id="password" type="password" placeholder="Mật khẩu" required>
                </div>

                <div class="input-group">
                    <input id="password2" type="password" placeholder="Nhập lại mật khẩu" required>
                </div>

                <button type="submit" class="btn-login">Đăng ký</button>
            </form>

            <div class="divider">
                <span>Hoặc</span>
            </div>

            <div class="social-login">
                <a href="#" class="google">
                    <i class="fab fa-google"></i> Google
                </a>
                <a href="#" class="facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
            </div>

            <p class="register">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </p>
        </div>
    </div>
</div>
</body>
<script src="../script.js"></script>
</html>
