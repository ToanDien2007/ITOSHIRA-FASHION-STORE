<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itoshira</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="login-container">
    <div class="login-left">
        <div class="overlay">
            <h1>Itoshira</h1>
            <p>Xin Chào Quý Khách!</p>
        </div>
    </div>

    <div class="login-right">
        <div class="login-box">
            <h2>Đăng nhập</h2>

            <form id="login-form">
                <div class="input-group">
                    <input id="login_username" type="text" placeholder="Email hoặc Username" required>
                </div>

                <div class="input-group">
                    <input id="login_password" type="password" placeholder="Mật khẩu" required>
                </div>

                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>

            <div class="divider">
                <span>Hoặc</span>
            </div>

            <div class="social-login">
                <a href="#" class="google">
                    <i class="fab fa-google"></i> Google
                </a>
                <a href="#" class="facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
            </div>

            <p class="register">
                Chưa có tài khoản? <a href="register.html">Đăng ký</a>
            </p>
        </div>
    </div>
</div>

</body>
<script src="../script.js"></script>
</html>
